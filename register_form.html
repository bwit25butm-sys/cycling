<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" size="5x5" type="image/svg+xml" href="./logo.png" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Register your interest</title>
    <link rel="stylesheet" href="register_form.css">
</head>
<body>

    <div class="form-container">
        <a href="index.html" class="back-link">&larr; Back to index</a>
        
        <h1>Register your interest for future events</h1>
        
        <form action="register.php" method="POST">
            <div class="form-group">
                <label for="firstname">Firstname</label>
                <input type="text" id="firstname" name="firstname" required>
            </div>

            <div class="form-group">
                <label for="surname">Surname</label>
                <input type="text" id="surname" name="surname" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" value="yes" required>
                <label for="terms">Do you accept the terms and conditions?</label>
            </div>

            <button type="submit" class="submit-btn">Submit Registration</button>
        </form>
    </div>
    
</body>
</html>
