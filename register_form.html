<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" size="5x5" type="image/svg+xml" href="./resources/logo.png" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Register your interest</title>
    <link rel="stylesheet" href="./css/register_form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <!-- back to index -->
    <a href="./index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>  Back to Index
    </a>    
    <!-- form container -->
    <div class="form-container">
        <h1>Register your interest for future events</h1>
        <form action="register.php" method="POST">
            <div class="form-group">
                <label for="firstname">Firstname</label>
                <input type="text" id="firstname" name="firstname" placeholder="Enter your firstname" required>
            </div>

            <div class="form-group">
                <label for="surname">Surname</label>
                <input type="text" id="surname" name="surname" placeholder="Enter your surname" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" value="yes" required>
                <label for="terms">Do you accept the terms and conditions?</label>
            </div>

            <button type="submit" class="submit-btn">Submit Registration</button>
        </form>
        <div class="register-link">
            <p>Do you want to admin login?</p>
            <a href="./admin_login.html">Admin Login</a>
        </div>
    </div>
    
</body>
</html>
